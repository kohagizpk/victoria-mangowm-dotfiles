# Execute
exec-once=bash ~/.config/mango/scripts/autostart.sh

# Window effect
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 3
blur_params_radius = 6
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.3

shadows = 1
layer_shadows = 1
shadow_only_floating = 1
shadows_size = 18
shadows_blur = 22
shadows_position_x = 0
shadows_position_y = 4
shadowscolor= 0x00000090

border_radius=10
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=0.88

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 0-horizontal,1-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=350
animation_duration_open=280
animation_duration_tag=250
animation_duration_close=350
animation_duration_focus=100
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=1.0
scroller_focus_center=1
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=36
cursor_theme=Animated-Mew-Cursor
drag_tile_to_tile=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us
xkb_rules_variant=intl

# Trackpad
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
mouse_natural_scrolling=0

# Appearance
gappih=6
gappiv=6
gappoh=14
gappov=14
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=2
rootcolor=0x1a1b26ff
bordercolor=0x24283bff
focuscolor=0x4c1d95ff
maximizescreencolor=0xc0caf5ff
urgentcolor=0xdb4b4bff
scratchpadcolor=0xbb9af7ff
globalcolor=0x9ece6aff
overlaycolor=0x4c1d95ff

# layout support:
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile


# reload config
bind=Alt,r,reload_config

# menu and terminal
bind=SUPER,d,spawn,rofi -show drun -theme ~/.config/mango/config/rofi/theme.rasi
bind=SUPER,v,spawn_shell,cliphist list | fuzzel --config ~/.config/mango/config/fuzzel.ini --dmenu --with-nth 2 | cliphist decode | wl-copy
bind=SUPER+SHIFT,s,spawn,~/.config/mango/scripts/print.sh
bind=SUPER,Return,spawn,kitty
bind=SUPER,e,spawn,nemo
bind=SUPER,w,spawn,helium-browser
bind=SUPER,a,spawn,discord --enable-features=UseOzonePlatform,WebRTCPipeWireCapturer --ozone-platform=wayland
bind=SUPER,s,spawn,spotify
bind=SUPER,f,spawn,waypaper 

# Window Rules
windowrule=isfloating:1,appid:waypaper
# HDMI-A-1
windowrule=tags:1,monitor:HDMI-A-1,appid:discord
windowrule=tags:2,monitor:HDMI-A-1,appid:spotify
# DP-1
windowrule=tags:1,monitor:DP-1,appid:helium


# exit
bind=ALT,m,quit
bind=SUPER,q,killclient,

# switch window focus
#bind=SUPER,Tab,focusstack,next
bind=ALT,h,focusdir,left
bind=ALT,j,focusdir,down
bind=ALT,k,focusdir,up
bind=ALT,l,focusdir,right

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
bind=ALT,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=ALT,a,togglefloating,
bind=ALT,s,togglemaximizescreen,
bind=ALT,f,togglefullscreen,
bind=ALT,d,togglefakefullscreen,
bind=ALT,i,minimized,
bind=ALT,o,restore_minimized,
bind=SUPER+SHIFT,I,toggleoverlay
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,


# brightness and volume
bind=none,XF86AudioMicMute,spawn_shell,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=none,XF86AudioMute,spawn,$HOME/.config/mango/scripts/volume.sh mute
bind=none,XF86AudioRaiseVolume,spawn,$HOME/.config/mango/scripts/volume.sh up
bind=none,XF86AudioLowerVolume,spawn,$HOME/.config/mango/scripts/volume.sh down
bind=ALT,XF86AudioRaiseVolume,spawn,$HOME/.config/mango/scripts/brightness.sh up
bind=ALT,XF86AudioLowerVolume,spawn,$HOME/.config/mango/scripts/brightness.sh down

# tag switch
bind=SUPER,SHIFT,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=SUPER,SHIFT,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# bind=Alt,1,tagsilent,1
bind=Alt,1,tag,1,0
bind=Alt,2,tag,2,0
bind=Alt,3,tag,3,0
bind=Alt,4,tag,4,0
bind=Alt,5,tag,5,0
bind=Alt,6,tag,6,0
bind=Alt,7,tag,7,0
bind=Alt,8,tag,8,0
bind=Alt,9,tag,9,0

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# NONE mode key only work in ov mode
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client


# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
drag_tile_small=0
dropcolor=0x4c1d9500